<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ADLC Mission Control — Verizon Enterprise</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --vz-red: #ee0000; --vz-black: #000000; --vz-gray: #f6f6f6; --vz-border: #d8dada; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; color: var(--vz-black); overflow: hidden; }
    .status-pulse { animation: pulse 2s infinite ease-in-out; }
    @keyframes pulse { 0% { opacity: 0.1; r: 40; } 50% { opacity: 0.4; r: 55; } 100% { opacity: 0.1; r: 40; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const AGENTS = [
      { id: "orchestrator", label: "Orchestrator", x: 480, y: 300, type: "hub" },
      { id: "monitor", label: "Monitoring Agent", x: 200, y: 150, phase: "ANALYSIS" },
      { id: "oracle", label: "Oracle Database", x: 200, y: 450, phase: "ANALYSIS" },
      { id: "opensearch", label: "OpenSearch DB", x: 760, y: 150, phase: "REMEDIATION" },
      { id: "remediator", label: "Remediator", x: 760, y: 450, phase: "REMEDIATION" }
    ];

    const Dashboard = () => {
      const [currentPhase, setCurrentPhase] = useState("ANALYSIS");
      const phases = ["ANALYSIS", "APPROVAL", "REMEDIATION", "VERIFICATION", "COMPLETE"];

      // Simulated Workflow Progression
      useEffect(() => {
        const interval = setInterval(() => {
          setCurrentPhase(prev => phases[(phases.indexOf(prev) + 1) % phases.length]);
        }, 5000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
          {/* Verizon Header */}
          <header style={{ padding: '20px 40px', borderBottom: `2px solid var(--vz-black)`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '20px' }}>
              <div style={{ fontSize: '28px', fontWeight: '900', letterSpacing: '-1px' }}>verizon<span style={{color: 'var(--vz-red)'}}>.</span></div>
              <div style={{ borderLeft: '1px solid #ccc', paddingLeft: '20px' }}>
                <div style={{ fontWeight: '700', fontSize: '14px' }}>ADLC MISSION CONTROL ROUTER</div>
                <div style={{ fontSize: '12px', color: '#666' }}>Autonomous Billing Profile Remediation</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: '30px' }}>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: '10px', fontWeight: '700' }}>WORKFLOW STATUS</div>
                <div style={{ fontSize: '14px', color: 'var(--vz-red)', fontWeight: '700' }}>{currentPhase}</div>
              </div>
            </div>
          </header>

          <main style={{ flex: 1, display: 'flex', background: 'var(--vz-gray)' }}>
            <div style={{ flex: 1, position: 'relative' }}>
              <svg viewBox="0 0 960 600" style={{ width: '100%', height: '100%' }}>
                {/* Edges with Conditional Flow Animation */}
                {AGENTS.filter(a => a.id !== 'orchestrator').map(agent => (
                  <g key={agent.id}>
                    <line x1="480" y1="300" x2={agent.x} y2={agent.y} stroke="#ccc" strokeWidth="1" strokeDasharray="5,5" />
                    {currentPhase === agent.phase && (
                      <circle r="4" fill="var(--vz-red)">
                        <animateMotion dur="2s" repeatCount="indefinite" path={`M 480 300 L ${agent.x} ${agent.y}`} />
                      </circle>
                    )}
                  </g>
                ))}

                {/* Nodes */}
                {AGENTS.map(agent => (
                  <g key={agent.id}>
                    {currentPhase === agent.phase && (
                      <circle cx={agent.x} cy={agent.y} fill="var(--vz-red)" className="status-pulse" />
                    )}
                    <rect x={agent.x-60} y={agent.y-25} width="120" height="50" fill="white" stroke={currentPhase === agent.phase ? 'var(--vz-red)' : '#000'} strokeWidth="2" />
                    <text x={agent.x} y={agent.y+5} textAnchor="middle" fontSize="11" fontWeight="700" fill={currentPhase === agent.phase ? 'var(--vz-red)' : '#000'}>{agent.label.toUpperCase()}</text>
                  </g>
                ))}
              </svg>
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
